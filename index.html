<!DOCTYPE html>
<html lang="es" class="h-full w-full select-none bg-black text-white">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PITGUIDE - Karting Live Timing</title>
  
  <!-- PWA Meta Tags -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PITGUIDE">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  
  <!-- Google Fonts: Outfit (Sans) y JetBrains Mono (Monospace) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            oled: '#000000',
            neonGreen: '#39FF14',
            neonRed: '#FF3131',
            neonYellow: '#FFE600',
            neonBlue: '#00E5FF',
            neonPink: '#FF2A85',
            cardGray: '#0E0E10',
            borderGray: '#1F1F23',
            textGray: '#8E8E93',
          },
          fontFamily: {
            mono: ['JetBrains Mono', 'Courier New', 'monospace'],
            sans: ['Outfit', 'Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <!-- Preact & HTM UMD Libraries (Carga sin necesidad de CORS en file://) -->
  <script src="https://unpkg.com/preact@10.19.3/dist/preact.min.js"></script>
  <script src="https://unpkg.com/preact@10.19.3/hooks/dist/hooks.umd.js"></script>
  <script src="https://unpkg.com/htm@3.1.1/dist/htm.umd.js"></script>

  <style>
    /* Estilos globales para evitar scroll y comportamiento de rebote en iOS */
    html, body {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    
    .mono-num {
      font-variant-numeric: tabular-nums;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="h-full w-full font-sans antialiased text-gray-200">
  <div id="root" class="h-full w-full flex flex-col"></div>
  
  <!-- Main Script: Cargado como script normal para soporte file:// nativo -->
  <script src="app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado con éxito:', reg.scope))
          .catch(err => console.error('Error al registrar Service Worker:', err));
      });
    }
  </script>
</body>
</html>
